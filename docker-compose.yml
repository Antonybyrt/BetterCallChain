version: '3.8'

services:
  node1:
    build: .
    image: bcc-node:latest        # L'image buildée reçoit ce nom standard
    container_name: bcc-node1
    command: ["bcc-node", "--config", "/app/config/node1.toml"]
    volumes:
      - ./config:/app/config:ro
      - bcc_data1:/data
    ports:
      - "8081:8080"
      - "9081:9080"
    networks:
      bcc-network:
        ipv4_address: 172.30.0.2
    restart: always
    environment:
      # Full structured logs: DEBUG for bcc_node (mempool, P2P, API, slot_ticker)
      # and debug for the rest. Override with e.g. RUST_LOG=bcc_node=trace.
      - RUST_LOG=bcc_node=debug,bcc_core=debug,debug
      # Inject the node name so it appears in every log line via tracing spans.
      - BCC_NODE_NAME=node1
    logging:
      driver: "json-file"
      options:
        # Keep enough history to diagnose a full test run.
        max-size: "50m"
        max-file: "5"

  node2:
    image: bcc-node:latest        # Réutilise l'image buildée par node1
    container_name: bcc-node2
    command: ["bcc-node", "--config", "/app/config/node2.toml"]
    volumes:
      - ./config:/app/config:ro
      - bcc_data2:/data
    ports:
      - "8082:8080"
      - "9082:9080"
    networks:
      bcc-network:
        ipv4_address: 172.30.0.3
    restart: always
    depends_on:
      - node1
    environment:
      - RUST_LOG=bcc_node=debug,bcc_core=debug,debug
      - BCC_NODE_NAME=node2
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  node3:
    image: bcc-node:latest
    container_name: bcc-node3
    command: ["bcc-node", "--config", "/app/config/node3.toml"]
    volumes:
      - ./config:/app/config:ro
      - bcc_data3:/data
    ports:
      - "8083:8080"
      - "9083:9080"
    networks:
      bcc-network:
        ipv4_address: 172.30.0.4
    restart: always
    depends_on:
      - node1
    environment:
      - RUST_LOG=bcc_node=debug,bcc_core=debug,debug
      - BCC_NODE_NAME=node3
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  node4:
    image: bcc-node:latest
    container_name: bcc-node4
    command: ["bcc-node", "--config", "/app/config/node4.toml"]
    volumes:
      - ./config:/app/config:ro
      - bcc_data4:/data
    ports:
      - "8084:8080"
      - "9084:9080"
    networks:
      bcc-network:
        ipv4_address: 172.30.0.5
    restart: always
    depends_on:
      - node1
    environment:
      - RUST_LOG=bcc_node=debug,bcc_core=debug,debug
      - BCC_NODE_NAME=node4
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  node5:
    image: bcc-node:latest
    container_name: bcc-node5
    command: ["bcc-node", "--config", "/app/config/node5.toml"]
    volumes:
      - ./config:/app/config:ro
      - bcc_data5:/data
    ports:
      - "8085:8080"
      - "9085:9080"
    networks:
      bcc-network:
        ipv4_address: 172.30.0.6
    restart: always
    depends_on:
      - node1
    environment:
      - RUST_LOG=bcc_node=debug,bcc_core=debug,debug
      - BCC_NODE_NAME=node5
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  visualizer:
    build:
      context: .
      dockerfile: tools/bcc-visualizer/Dockerfile
    image: bcc-visualizer:latest
    container_name: bcc-visualizer
    command:
      - bcc-visualizer
      - --bind
      - "0.0.0.0:9090"
      - --debug-urls
      - "ws://172.30.0.2:9080/debug,ws://172.30.0.3:9080/debug,ws://172.30.0.4:9080/debug,ws://172.30.0.5:9080/debug,ws://172.30.0.6:9080/debug"
      - --node-ports
      - "8081,8082,8083,8084,8085"
    ports:
      - "9090:9090"
    networks:
      bcc-network:
        ipv4_address: 172.30.0.10
    depends_on:
      - node1
      - node2
      - node3
      - node4
      - node5
    restart: unless-stopped
    environment:
      - RUST_LOG=bcc_visualizer=info

volumes:
  bcc_data1:
  bcc_data2:
  bcc_data3:
  bcc_data4:
  bcc_data5:

networks:
  bcc-network:
    name: bcc-network
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16
